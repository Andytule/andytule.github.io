name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel in-progress runs on the same branch to avoid wasted minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Format & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npx prettier --check "src/**/*.{ts,tsx,scss}"

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build
        run: npm run build
